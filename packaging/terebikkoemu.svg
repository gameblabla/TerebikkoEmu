<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f3a"/>
      <stop offset="1" stop-color="#0c0e1c"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6df0"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- TV body -->
  <rect x="40" y="64" width="176" height="128" rx="18" fill="#16182b" stroke="#2c3050" stroke-width="4"/>
  <!-- screen -->
  <rect x="58" y="82" width="120" height="92" rx="10" fill="url(#screen)"/>
  <!-- play triangle -->
  <path d="M104 106 L104 150 L142 128 Z" fill="#ffffff"/>
  <!-- speaker / control knobs -->
  <circle cx="196" cy="100" r="9" fill="#37d99a"/>
  <circle cx="196" cy="128" r="9" fill="#e4cc42"/>
  <circle cx="196" cy="156" r="9" fill="#db3545"/>
  <!-- antenna -->
  <path d="M112 64 L92 36 M144 64 L164 36" stroke="#a6acd0" stroke-width="6" stroke-linecap="round"/>
  <circle cx="92" cy="36" r="6" fill="#a6acd0"/>
  <circle cx="164" cy="36" r="6" fill="#a6acd0"/>
  <!-- little phone handset cue -->
  <rect x="60" y="196" width="136" height="14" rx="7" fill="#37d99a"/>
</svg>
